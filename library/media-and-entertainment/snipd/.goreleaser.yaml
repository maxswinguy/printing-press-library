version: 2
project_name: snipd-pp-cli
changelog:
  disable: true
builds:
  - id: snipd-pp-cli
    main: ./cmd/snipd-pp-cli
    binary: snipd-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/snipd/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: snipd-pp-mcp
    main: ./cmd/snipd-pp-mcp
    binary: snipd-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: snipd-pp-cli
    repository:
      owner: maxswinguy
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Turn your Snipd snips into a local, ranked, full-text-searchable corpus — search a concept across every note, quote, and transcript, pull the exact quote, and synthesize across shows from the command line, plus an MCP for agents."
    install: |
      bin.install "snipd-pp-cli"
      bin.install "snipd-pp-mcp"
