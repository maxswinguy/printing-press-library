version: 2
project_name: breezedoc-pp-cli
changelog:
  disable: true
builds:
  - id: breezedoc-pp-cli
    main: ./cmd/breezedoc-pp-cli
    binary: breezedoc-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/breezedoc/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: breezedoc-pp-mcp
    main: ./cmd/breezedoc-pp-mcp
    binary: breezedoc-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: breezedoc-pp-cli
    repository:
      owner: cathrynlavery
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "BreezeDoc's REST API provides a handful of endpoints which can be used to get information about your account and"
    install: |
      bin.install "breezedoc-pp-cli"
      bin.install "breezedoc-pp-mcp"
