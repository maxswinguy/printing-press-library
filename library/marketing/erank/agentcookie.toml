schema_version = 2
name = "erank-pp-cli"
display_name = "eRank"
description = "Keyword Tool data from eRank, plus local scoring, drift, and listing-gap analysis for Etsy sellers."
project_kind = "cli"

[secrets.file]
path = "~/.config/erank-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
"ERANK_XSRF_TOKEN" = true
