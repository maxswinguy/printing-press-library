name: yahoo-finance
display_name: Yahoo Finance
description: "Yahoo Finance CLI — market data, quotes, fundamentals, options, news"
version: "1.0.0"
category: commerce
base_url: "https://query1.finance.yahoo.com"

auth:
  type: none

config:
  format: toml
  path: "~/.config/yahoo-finance-pp-cli/config.toml"

resources:
  quote:
    description: "Real-time quotes and quote summaries"
    endpoints:
      list:
        method: GET
        path: "/v7/finance/quote"
        description: "Get current quotes for one or more symbols"
        params:
          - name: symbols
            type: string
            required: true
            description: "Comma-separated ticker symbols"
          - name: fields
            type: string
            description: "Comma-separated response fields filter"
          - name: region
            type: string
            default: "US"
            description: "Market region"
        response:
          type: array
          item: Quote

      summary:
        method: GET
        path: "/v10/finance/quoteSummary/{symbol}"
        description: "Deep quote summary including price, fundamentals, ownership, and filings"
        params:
          - name: symbol
            type: string
            required: true
            positional: true
            description: "Ticker symbol"
          - name: modules
            type: string
            default: "price,summaryDetail,financialData,defaultKeyStatistics"
            description: "Comma-separated quoteSummary modules: assetProfile, summaryProfile, summaryDetail, price, financialData, defaultKeyStatistics, incomeStatementHistory, incomeStatementHistoryQuarterly, balanceSheetHistory, balanceSheetHistoryQuarterly, cashflowStatementHistory, cashflowStatementHistoryQuarterly, earnings, earningsHistory, earningsTrend, calendarEvents, secFilings, upgradeDowngradeHistory, recommendationTrend, institutionOwnership, fundOwnership, majorHoldersBreakdown, insiderHolders, insiderTransactions, netSharePurchaseActivity, indexTrend, industryTrend, sectorTrend"
        response:
          type: object
          item: QuoteSummary

  chart:
    description: "Historical OHLCV price data"
    endpoints:
      get:
        method: GET
        path: "/v8/finance/chart/{symbol}"
        description: "Historical price chart data for a symbol"
        params:
          - name: symbol
            type: string
            required: true
            positional: true
            description: "Ticker symbol"
          - name: interval
            type: string
            default: "1d"
            description: "Bar interval: 1m, 2m, 5m, 15m, 30m, 60m, 90m, 1h, 1d, 5d, 1wk, 1mo, 3mo"
          - name: range
            type: string
            default: "1mo"
            description: "Date range: 1d, 5d, 1mo, 3mo, 6mo, 1y, 2y, 5y, 10y, ytd, max"
          - name: period1
            type: int
            description: "Start unix timestamp (overrides range)"
          - name: period2
            type: int
            description: "End unix timestamp"
          - name: events
            type: string
            default: "div|split|earn"
            description: "Events to include: div, split, earn"
          - name: includePrePost
            type: bool
            default: false
            description: "Include pre/post-market data"
        response:
          type: object
          item: Chart

  options:
    description: "Options chains for equities and ETFs"
    endpoints:
      get:
        method: GET
        path: "/v7/finance/options/{symbol}"
        description: "Options chain for a symbol (calls and puts)"
        params:
          - name: symbol
            type: string
            required: true
            positional: true
            description: "Underlying ticker symbol"
          - name: date
            type: int
            description: "Expiration unix epoch (omit for nearest expiration)"
        response:
          type: object
          item: OptionChain

  lookup:
    description: "Symbol search and lookup"
    endpoints:
      query:
        method: GET
        path: "/v1/finance/search"
        description: "Search for symbols, news, and funds matching a query"
        params:
          - name: q
            flag_name: query
            type: string
            required: true
            description: "Search query (ticker or company name)"
          - name: quotesCount
            type: int
            default: 10
            description: "Max quote results"
          - name: newsCount
            type: int
            default: 5
            description: "Max news results"
          - name: region
            type: string
            default: "US"
            description: "Market region"
        response:
          type: object
          item: SearchResult

  screener:
    description: "Predefined and custom stock screeners"
    endpoints:
      predefined:
        method: GET
        path: "/v1/finance/screener/predefined/saved"
        description: "Run a predefined screener by ID"
        params:
          - name: scrIds
            type: string
            required: true
            default: "day_gainers"
            description: "Predefined screener: day_gainers, day_losers, most_actives, undervalued_growth_stocks, aggressive_small_caps, small_cap_gainers, top_mutual_funds, undervalued_large_caps, growth_technology_stocks, portfolio_anchors, conservative_foreign_funds, high_yield_bond"
          - name: count
            type: int
            default: 25
            description: "Max results"
          - name: region
            type: string
            default: "US"
            description: "Market region"
        response:
          type: array
          item: ScreenerQuote

  trending:
    description: "Trending symbols by region"
    endpoints:
      list:
        method: GET
        path: "/v1/finance/trending/{region}"
        description: "Top trending symbols in a region right now"
        params:
          - name: region
            type: string
            required: true
            positional: true
            default: "US"
            description: "Region code: US, GB, FR, DE, HK, IN, AU, CA, BR, SG, TW, IT, ES, NL"
          - name: count
            type: int
            default: 10
            description: "Max trending results"
        response:
          type: array
          item: TrendingSymbol

  insights:
    description: "Company insights, valuation, and technical events"
    endpoints:
      get:
        method: GET
        path: "/ws/insights/v3/finance/insights"
        description: "Insights for a symbol: technical events, valuation, research reports"
        params:
          - name: symbol
            type: string
            required: true
            description: "Ticker symbol"
        response:
          type: object
          item: Insights

  fundamentals:
    description: "Time series of fundamentals (quarterly/annual)"
    endpoints:
      timeseries:
        method: GET
        path: "/ws/fundamentals/v1/finance/timeseries/{symbol}"
        description: "Fundamentals time series (EPS, revenue, margin, cash flow, etc.)"
        params:
          - name: symbol
            type: string
            required: true
            positional: true
            description: "Ticker symbol"
          - name: type
            type: string
            required: true
            default: "annualTotalRevenue,annualNetIncome,annualEbit,annualFreeCashFlow"
            description: "Comma-separated fundamentals keys (prefix annual/quarterly/trailing)"
          - name: period1
            type: int
            default: 0
            description: "Start unix timestamp"
          - name: period2
            type: int
            description: "End unix timestamp (default now)"
        response:
          type: object
          item: TimeSeries

  recommendations:
    description: "Symbols related by analyst recommendation"
    endpoints:
      bysymbol:
        method: GET
        path: "/v6/finance/recommendationsbysymbol/{symbol}"
        description: "Symbols that share recommendations with the given symbol"
        params:
          - name: symbol
            type: string
            required: true
            positional: true
            description: "Ticker symbol"
        response:
          type: object
          item: Recommendations

  autocomplete:
    description: "Legacy autocomplete (faster than search)"
    endpoints:
      get:
        method: GET
        path: "/v6/finance/autocomplete"
        description: "Autocomplete symbols and company names"
        params:
          - name: query
            type: string
            required: true
            description: "Prefix query"
          - name: lang
            type: string
            default: "en"
            description: "Language code"
          - name: region
            type: string
            default: "US"
            description: "Region code"
        response:
          type: object
          item: AutocompleteResult
