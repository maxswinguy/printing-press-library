version: 2
project_name: yahoo-finance-pp-cli
changelog:
  disable: true
builds:
  - id: yahoo-finance-pp-cli
    main: ./cmd/yahoo-finance-pp-cli
    binary: yahoo-finance-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/yahoo-finance/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: yahoo-finance-pp-mcp
    main: ./cmd/yahoo-finance-pp-mcp
    binary: yahoo-finance-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: yahoo-finance-pp-cli
    repository:
      owner: charles-garrison
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Yahoo Finance endpoint plus a SQLite portfolio, covered-call screener"
    install: |
      bin.install "yahoo-finance-pp-cli"
      bin.install "yahoo-finance-pp-mcp"
